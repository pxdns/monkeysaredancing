<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Docs</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
    <meta property="og:title" content="Google Docs">
    <meta property="og:description" content="Create and edit web-based documents, spreadsheets, and presentations. Store documents online and access them from any computer.">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4285f4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Google Docs">
    <script>
        // Permanent title override - always show as Google Docs
        (function() {
            const realTitle = 'Google Docs';
            Object.defineProperty(document, 'title', {
                get: function() { return realTitle; },
                set: function() { return realTitle; }
            });
            setInterval(function() {
                if (document.title !== realTitle) {
                    document.title = realTitle;
                }
            }, 100);
        })();
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="auth.js" defer></script>
    <script src="launcher.js" defer></script>
</head>
<body>
    <div id="authScreen" class="screen">
        <div class="crt-overlay"></div>
        <div class="retro-container">
            <h1 class="retro-title">pixel standalone</h1>
            <p class="retro-subtitle">:: retroscope edition ::</p>
            
            <div class="button-grid">
                <button class="retro-btn js-btn" onclick="launchClient('js')">
                    <span class="btn-icon">JS</span>
                    <span class="btn-text">tuff client js</span>
                </button>
                
                <button class="retro-btn wasm-btn" onclick="launchClient('wasm')">
                    <span class="btn-icon">WASM</span>
                    <span class="btn-text">tuffclient wasm</span>
                </button>
                
                <button class="retro-btn xp-btn" onclick="launchXPClient()">
                    <span class="btn-icon">XP</span>
                    <span class="btn-text">xpclient</span>
                </button>
                
                <button class="retro-btn launcher-btn" onclick="showNexoModal()">
                    <span class="btn-icon">NEXO</span>
                    <span class="btn-text">nexo client</span>
                </button>
                
                <button class="retro-btn astra-btn" onclick="launchAstraClient('112')">
                    <span class="btn-icon">A12</span>
                    <span class="btn-text">astra 1.12</span>
                </button>
                
                <button class="retro-btn astra-btn" onclick="launchAstraClient('18')">
                    <span class="btn-icon">A18</span>
                    <span class="btn-text">astra 1.8</span>
                </button>
            </div>
            
            <div class="auth-section hidden" id="authSection">
                <div id="g_id_onload" data-client_id="439714968719-ko13oc35j978s6oc47rvihutl2omrc98.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
                <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left" data-width="300"></div>
                <p class="auth-note">sign in with google to access xpclient</p>
                <p class="auth-emails">authorized: e42xec@gmail.com, xpknown@gmail.com</p>
                <button onclick="hideAuthSection()" style="margin-top:15px;padding:8px 20px;background:transparent;border:1px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.7);cursor:pointer;border-radius:4px;font-family:'instrument serif',serif;">cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Nexo Client Modal -->
    <div id="nexoModal" class="modal hidden">
        <div class="modal-content">
            <h2 class="modal-title">select client mode</h2>
            <div class="modal-options">
                <button class="modal-option js-option" onclick="launchNexoClient('js')">
                    <span class="option-icon">JS</span>
                    <span class="option-name">javascript mode</span>
                    <span class="option-desc">standard js execution - offline</span>
                </button>
                <button class="modal-option wasm-option" onclick="launchNexoClient('wasm')">
                    <span class="option-icon">WASM</span>
                    <span class="option-name">wasm mode</span>
                    <span class="option-desc">webassembly with jspi - online</span>
                </button>
            </div>
            <button class="modal-close-btn" onclick="hideNexoModal()">[ cancel ]</button>
        </div>
    </div>
    
    <div id="clientContainer" class="hidden"></div>
    
    <!-- PWA Offline Indicator -->
    <div id="offlineIndicator" class="offline-indicator">
        you are offline - some features may be limited
    </div>
    
    <!-- PWA Install Button (shown when installable) -->
    <button id="pwaInstallBtn" class="pwa-install-btn" onclick="installPWA()" style="display: none;">
        install app
    </button>
    
    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('[PWA] Service Worker registered:', registration.scope);
                        
                        // Handle updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('[PWA] New version available - refresh to update');
                                    // Optional: Show update notification
                                    if (confirm('A new version is available! Refresh to update?')) {
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.error('[PWA] Service Worker registration failed:', error);
                    });
                
                // Listen for messages from service worker
                navigator.serviceWorker.addEventListener('message', (event) => {
                    if (event.data.type === 'OFFLINE_READY') {
                        console.log('[PWA] App is ready for offline use');
                    }
                });
            });
        }
        
        // PWA Install Prompt handling
        let deferredPrompt;
        const installBtn = document.getElementById('pwaInstallBtn');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('[PWA] Install prompt available');
            
            // Show the install button
            if (installBtn) {
                installBtn.style.display = 'block';
                setTimeout(() => installBtn.classList.add('visible'), 100);
            }
        });
        
        // Online/Offline detection
        const offlineIndicator = document.getElementById('offlineIndicator');
        
        function updateOnlineStatus() {
            if (navigator.onLine) {
                offlineIndicator.classList.remove('visible');
                console.log('[PWA] Connection restored');
            } else {
                offlineIndicator.classList.add('visible');
                console.log('[PWA] Gone offline');
            }
        }
        
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        
        // Check initial status
        updateOnlineStatus();
        
        async function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('[PWA] User accepted install');
                } else {
                    console.log('[PWA] User dismissed install');
                }
                deferredPrompt = null;
            }
        }
        
        // Check if app was installed
        window.addEventListener('appinstalled', () => {
            console.log('[PWA] App was installed');
            deferredPrompt = null;
        });
    </script>
</body>
</html>
